<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-image: url("背景2.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
        }

        .input {
            color: white;
            border: 2px solid #cc75b6;
            border-radius: 10px;
            padding: 10px 25px;
            background: transparent;
            max-width: 190px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .input:active {
            box-shadow: 2px 2px 15px #da81b0 inset;
        }

        .tx {
            width: 100px;
            position: absolute;
            left: 50%;
            top: 15%;
            transform: translateX(-50%);
            border-radius: 50px;
        }

        .monly {
            position: absolute;
            left: 50%;
            top: 25.8%;
            transform: translateX(-50%);
            border-radius: 20px;
        }

        .bj {
            width: 600px;
            height: 100%;
            background-color: rgb(242, 230, 216);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 20px;
            opacity: 0.7;
        }

        .jj {
            width: 220px;
            height: 35px;
            background-color: white;
            position: absolute;
            left: 50%;
            top: 27%;
            transform: translateX(-50%);
            border-radius: 20px;
        }

        .gerentubiao {
            width: 230px;
            height: 80px;
            display: flex;
            position: absolute;
            left: 50%;
            top: 31%;
            transform: translateX(-50%);
        }

        .box1 {
            width: 57px;
            margin: 10px;
        }

        .box2 {
            width: 55px;
            margin: 10px;

        }

        .box3 {
            width: 58px;
            margin: 10px;
        }

        .dianjitupian {
            position: absolute;
            left: 50%;
            top: 53%;
            transform: translateX(-50%);
        }

        .wenzhang1 {
            width: 600px;
            height: 300px;
            background-color: rgb(255, 255, 255);
            display: flex;
            float: left;
            position: absolute;
            left: 50%;
            top: 60%;
            transform: translateX(-50%);
            border-radius: 20px;
        }

        .wz1 {
            width: 200px;
            height: 300px;
            border-radius: 20px;
            background-size: cover;
        }

        .wz1and1 {
            margin: 10px;
        }

        .wz1and2 {
            position: absolute;
            left: 57%;
            top: 20%;
            transform: translateX(-50%);
            border-radius: 20px;
        }

        .wenzhang2 {
            width: 600px;
            height: 300px;
            background-color: rgb(255, 255, 255);
            display: flex;
            float: left;
            position: absolute;
            left: 50%;
            top: 95%;
            transform: translateX(-50%);
            border-radius: 20px;
        }

        .wz2 {
            width: 200px;
            height: 300px;
            border-radius: 20px;
            background-size: cover;
        }

        .wz2and1 {
            margin: 10px;
        }

        .wz2and2 {
            position: absolute;
            left: 57%;
            top: 20%;
            transform: translateX(-50%);
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="bj"></div>
    <div class="jj"></div>
    <input placeholder="搜索" class="input" name="text" type="text" />
    <div>
        <img src="tx2.jpg" alt="" class="tx">
        <p class="monly">痛い、めちゃくちゃ痛い！</p>
    </div>
    <div class="gerentubiao">
        <div><a href=""><img src="QQ.png" alt="" class="box1"></a></div>
        <div><img src="X.png" alt="" class="box2"></div>
        <div><img src="github.png" alt="" class="box3"></div>
    </div>
    <div class="dianjitupian">
        <h2>点击图片进入文章</h2>
    </div>
    <div class="wenzhang2">
        <div><img src="文章2.JPG" alt="" class="wz2"></div>
        <div class="wz2and1">
            <h2>测试</h2>
        </div>
        <div class="wz2and2">
            <p>什么都没有哦</p>
        </div>
    </div>
    <div class="wenzhang1">
        <div><a href="https://www.baidu.com/index.php?tn=75144485_2_dg&ch=1"><img src="文章1.JPG" alt=""
                    class="wz1"></a></div>
        <div class="wz1and1">
            <h2>第一次更新</h2>
        </div>
        <div class="wz1and2">
            <p>本次更新主页面ui以及优化网站超链接</p>
        </div>
    </div>
</body>


</html>
